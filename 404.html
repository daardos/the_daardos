<html lang="ru">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Roboto:wght@400;500;700&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a14;
            --text: #e0e0f0;
            --accent: #7b5cff;
            --accent2: #ff4da6;
            --accent3: #00e5ff;
            --glow-1: rgba(123, 92, 255, 0.5);
            --glow-2: rgba(255, 77, 166, 0.4);
            --glow-3: rgba(0, 229, 255, 0.35);
            --card-bg: rgba(20, 20, 45, 0.65);
            --card-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            cursor: default;
        }

        /* ============ CANVAS STARFIELD ============ */
        #starCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ============ NEBULA ORBS (CSS) ============ */
        .nebula {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            pointer-events: none;
            animation: nebulaPulse 8s ease-in-out infinite;
            opacity: 0.45;
        }
        .nebula-1 {
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, var(--glow-1) 0%, transparent 70%);
            top: -20%;
            left: -15%;
            animation-delay: 0s;
        }
        .nebula-2 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--glow-2) 0%, transparent 70%);
            bottom: -25%;
            right: -10%;
            animation-delay: -3s;
        }
        .nebula-3 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--glow-3) 0%, transparent 70%);
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -5.5s;
            opacity: 0.3;
        }
        @keyframes nebulaPulse {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.45;
            }
            25% {
                transform: translate(30px, -40px) scale(1.15);
                opacity: 0.55;
            }
            50% {
                transform: translate(-20px, 25px) scale(0.9);
                opacity: 0.35;
            }
            75% {
                transform: translate(-35px, -20px) scale(1.1);
                opacity: 0.5;
            }
        }
        .nebula-2 {
            animation-name: nebulaPulse2;
        }
        @keyframes nebulaPulse2 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.4;
            }
            33% {
                transform: translate(-40px, -30px) scale(1.2);
                opacity: 0.55;
            }
            66% {
                transform: translate(25px, 35px) scale(0.85);
                opacity: 0.3;
            }
        }

        /* ============ MAIN CONTAINER ============ */
        .main-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
            max-width: 850px;
            width: 100%;
        }

        /* ============ FLOATING ASTRONAUT (CSS ART) ============ */
        .astronaut-wrapper {
            position: relative;
            animation: floatAstro 6s ease-in-out infinite;
            margin-bottom: 10px;
            z-index: 11;
        }
        @keyframes floatAstro {
            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }
            15% {
                transform: translateY(-22px) rotate(1.5deg);
            }
            30% {
                transform: translateY(-8px) rotate(-0.5deg);
            }
            45% {
                transform: translateY(-28px) rotate(-2deg);
            }
            60% {
                transform: translateY(-3px) rotate(0.8deg);
            }
            75% {
                transform: translateY(-18px) rotate(-1.2deg);
            }
            90% {
                transform: translateY(-5px) rotate(0.3deg);
            }
        }
        .astronaut {
            width: 120px;
            height: 140px;
            position: relative;
        }
        .astro-helmet {
            width: 70px;
            height: 75px;
            background: radial-gradient(ellipse at 55% 40%, #f0f0f5 0%, #c8c8d8 50%, #8888a0 100%);
            border-radius: 50% 50% 45% 45%;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            box-shadow:
                inset 0 -4px 12px rgba(0, 0, 0, 0.3),
                0 8px 30px rgba(123, 92, 255, 0.5),
                0 0 60px rgba(0, 229, 255, 0.25);
            border: 3px solid rgba(255, 255, 255, 0.6);
        }
        .astro-visor {
            width: 48px;
            height: 38px;
            background: linear-gradient(135deg, #1a1a3e 0%, #0d0d2b 40%, #3a3aff 100%);
            border-radius: 55% 55% 40% 40%;
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: inset 0 0 20px rgba(100, 180, 255, 0.5);
            overflow: hidden;
        }
        .astro-visor-shine {
            position: absolute;
            width: 14px;
            height: 8px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            top: 6px;
            left: 8px;
            transform: rotate(-15deg);
        }
        .astro-body {
            width: 55px;
            height: 50px;
            background: linear-gradient(180deg, #e8e8f0 0%, #c0c0d0 100%);
            border-radius: 30px 30px 15px 15px;
            position: absolute;
            top: 68px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.5);
        }
        .astro-backpack {
            width: 30px;
            height: 40px;
            background: #9a9ab0;
            border-radius: 10px 10px 6px 6px;
            position: absolute;
            top: 70px;
            left: calc(50% - 48px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.4);
        }
        .astro-arm-left,
        .astro-arm-right {
            position: absolute;
            width: 12px;
            height: 35px;
            background: #d0d0dc;
            border-radius: 10px;
            top: 75px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            transform-origin: top center;
        }
        .astro-arm-left {
            left: calc(50% - 38px);
            transform: rotate(25deg);
            animation: armWaveLeft 3s ease-in-out infinite;
        }
        .astro-arm-right {
            right: calc(50% - 38px);
            transform: rotate(-20deg);
            animation: armWaveRight 3s ease-in-out infinite 0.4s;
        }
        @keyframes armWaveLeft {
            0%,
            100% {
                transform: rotate(25deg);
            }
            30% {
                transform: rotate(45deg);
            }
            60% {
                transform: rotate(10deg);
            }
        }
        @keyframes armWaveRight {
            0%,
            100% {
                transform: rotate(-20deg);
            }
            35% {
                transform: rotate(-40deg);
            }
            65% {
                transform: rotate(-5deg);
            }
        }

        /* ============ 404 GLITCH TEXT ============ */
        .error-code {
            font-size: clamp(140px, 22vw, 260px);
            font-weight: 900;
            line-height: 0.85;
            letter-spacing: -0.04em;
            position: relative;
            color: #ffffff;
            text-shadow:
                0 0 80px var(--glow-1),
                0 0 160px var(--glow-2),
                0 0 250px var(--glow-3),
                0 4px 8px rgba(0, 0, 0, 0.6);
            margin-bottom: 8px;
            animation: textFlicker 5s linear infinite;
        }
        .error-code .glitch-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: transparent;
            background: none;
            pointer-events: none;
        }
        .error-code::before,
        .error-code::after {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .error-code::before {
            color: #ff4da6;
            animation: glitchSkew1 3.5s ease-in-out infinite;
            clip-path: polygon(0 20%, 100% 20%, 100% 35%, 0 35%);
            text-shadow: 3px 0 #ff4da6, -3px 0 #00e5ff;
            z-index: 1;
        }
        .error-code::after {
            color: #00e5ff;
            animation: glitchSkew2 3.5s ease-in-out infinite 0.3s;
            clip-path: polygon(0 60%, 100% 55%, 100% 75%, 0 70%);
            text-shadow: -3px 0 #ff4da6, 3px 0 #7b5cff;
            z-index: 1;
        }
        @keyframes glitchSkew1 {
            0%,
            90%,
            100% {
                transform: translate(0, 0);
                opacity: 0;
            }
            91% {
                transform: translate(-8px, 3px) skew(0.5deg);
                opacity: 0.7;
            }
            92% {
                transform: translate(6px, -2px) skew(-0.3deg);
                opacity: 0.8;
            }
            93% {
                transform: translate(-4px, 1px) skew(0.2deg);
                opacity: 0;
            }
            94% {
                transform: translate(0, 0);
                opacity: 0;
            }
        }
        @keyframes glitchSkew2 {
            0%,
            92%,
            100% {
                transform: translate(0, 0);
                opacity: 0;
            }
            93% {
                transform: translate(7px, -3px) skew(-0.4deg);
                opacity: 0.7;
            }
            94% {
                transform: translate(-5px, 2px) skew(0.3deg);
                opacity: 0.8;
            }
            95% {
                transform: translate(3px, -1px) skew(-0.1deg);
                opacity: 0;
            }
            96% {
                transform: translate(0, 0);
                opacity: 0;
            }
        }
        @keyframes textFlicker {
            0%,
            19%,
            21%,
            23%,
            25%,
            54%,
            56%,
            100% {
                opacity: 1;
            }
            20%,
            24% {
                opacity: 0.85;
            }
            55% {
                opacity: 0.75;
            }
        }

        /* ============ SUBTITLE ============ */
        .subtitle {
            font-size: clamp(18px, 3vw, 26px);
            font-weight: 600;
            letter-spacing: 0.05em;
            color: #c8c8e8;
            margin-bottom: 6px;
            text-shadow: 0 0 30px rgba(200, 200, 255, 0.4);
        }
        .subtitle .highlight {
            color: var(--accent3);
            text-shadow: 0 0 25px var(--glow-3);
            animation: highlightPulse 2s ease-in-out infinite;
        }
        @keyframes highlightPulse {
            0%,
            100% {
                text-shadow: 0 0 25px var(--glow-3);
            }
            50% {
                text-shadow: 0 0 50px var(--glow-3), 0 0 80px var(--glow-2);
            }
        }

        /* ============ DESCRIPTION ============ */
        .description {
            font-size: clamp(14px, 1.8vw, 17px);
            color: #a0a0c0;
            max-width: 550px;
            line-height: 1.6;
            margin-bottom: 30px;
            letter-spacing: 0.02em;
            text-shadow: 0 0 10px rgba(160, 160, 200, 0.2);
        }

        /* ============ BUTTONS ============ */
        .buttons-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            position: relative;
            overflow: hidden;
            border: none;
            outline: none;
            font-family: inherit;
            white-space: nowrap;
        }
        .btn-primary {
            background: linear-gradient(135deg, #7b5cff 0%, #5b3cf0 50%, #9b7cff 100%);
            color: #fff;
            box-shadow: 0 8px 35px rgba(123, 92, 255, 0.45), 0 0 0 0 rgba(123, 92, 255, 0.5);
            animation: btnGlowPrimary 3s ease-in-out infinite;
        }
        @keyframes btnGlowPrimary {
            0%,
            100% {
                box-shadow: 0 8px 35px rgba(123, 92, 255, 0.45), 0 0 0 0 rgba(123, 92, 255, 0.5);
            }
            50% {
                box-shadow: 0 8px 50px rgba(123, 92, 255, 0.7), 0 0 0 18px rgba(123, 92, 255, 0);
            }
        }
        .btn-primary:hover {
            transform: translateY(-4px) scale(1.04);
            box-shadow: 0 16px 50px rgba(123, 92, 255, 0.65), 0 0 0 0 rgba(123, 92, 255, 0);
        }
        .btn-primary:active {
            transform: translateY(-1px) scale(0.97);
            transition: all 0.1s;
        }

        .btn-outline {
            background: transparent;
            color: #e0e0f0;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }
        .btn-outline:hover {
            border-color: var(--accent3);
            color: #fff;
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.3), 0 8px 25px rgba(0, 0, 0, 0.3);
            transform: translateY(-4px) scale(1.04);
            background: rgba(0, 229, 255, 0.06);
        }
        .btn-outline:active {
            transform: translateY(-1px) scale(0.97);
            transition: all 0.1s;
        }

        .btn .icon-arrow {
            display: inline-block;
            transition: transform 0.3s ease;
        }
        .btn:hover .icon-arrow {
            transform: translateX(5px);
        }
        .btn-outline .icon-arrow {
            transition: transform 0.3s ease;
        }
        .btn-outline:hover .icon-arrow {
            transform: translateX(5px);
        }

        /* ============ SEARCH BAR ============ */
        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #e8e8f8;
            font-size: 15px;
            letter-spacing: 0.02em;
            font-family: inherit;
            min-width: 0;
        }
        .search-btn {
            background: linear-gradient(135deg, #7b5cff, #5b3cf0);
            border: none;
            color: #fff;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        .search-btn:hover {
            background: linear-gradient(135deg, #9b7cff, #7b5cff);
            box-shadow: 0 0 30px rgba(123, 92, 255, 0.6);
            transform: scale(1.08);
        }
        .search-btn:active {
            transform: scale(0.93);
            transition: all 0.1s;
        }

        /* ============ SHOOTING STARS (periodic CSS) ============ */
        .shooting-star {
            position: fixed;
            width: 2px;
            height: 90px;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0));
            border-radius: 2px;
            z-index: 2;
            pointer-events: none;
            animation: shoot 1.8s linear forwards;
            opacity: 0;
        }
        @keyframes shoot {
            0% {
                opacity: 0;
                transform: translate(0, 0) rotate(-35deg);
            }
            5% {
                opacity: 1;
            }
            25% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(-500px, 600px) rotate(-35deg);
            }
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 600px) {
            .error-code {
                font-size: 120px;
            }
            .astronaut {
                width: 90px;
                height: 105px;
            }
            .astro-helmet {
                width: 52px;
                height: 56px;
            }
            .astro-visor {
                width: 35px;
                height: 28px;
                top: 14px;
            }
            .astro-body {
                width: 42px;
                height: 38px;
                top: 50px;
            }
            .astro-backpack {
                width: 22px;
                height: 30px;
                top: 52px;
                left: calc(50% - 36px);
            }
            .astro-arm-left,
            .astro-arm-right {
                width: 9px;
                height: 26px;
                top: 55px;
            }
            .astro-arm-left {
                left: calc(50% - 28px);
            }
            .astro-arm-right {
                right: calc(50% - 28px);
            }
            .buttons-row {
                flex-direction: column;
                align-items: center;
                gap: 12px;
            }
            .btn {
                width: 100%;
                justify-content: center;
                padding: 13px 24px;
                font-size: 15px;
            }
            .description {
                margin-bottom: 22px;
            }
        }
    </style>
    <script>
    (function() {
        var settings = { theme: 'dark', font: 'inter', fontsize: 'normal', accent: '#00d1b2' };
        try {
            var saved = JSON.parse(localStorage.getItem('site-settings'));
            if (saved) {
                if (saved.theme) settings.theme = saved.theme;
                if (saved.font) settings.font = saved.font;
                if (saved.fontsize) settings.fontsize = saved.fontsize;
                if (saved.accent) settings.accent = saved.accent;
            }
        } catch(e) {}
        
        var root = document.documentElement;
        
        // Тема
        if (settings.theme === 'light') {
            document.body.classList.add('light-theme');
        } else if (settings.theme === 'auto' && window.matchMedia('(prefers-color-scheme: light)').matches) {
            document.body.classList.add('light-theme');
        }
        
        // Шрифт
        var fonts = {
            inter: "'Inter', system-ui, sans-serif",
            roboto: "'Roboto', system-ui, sans-serif",
            mono: "'Fira Code', monospace"
        };
        root.style.setProperty('--font-family', fonts[settings.font] || fonts.inter);
        
        // Размер шрифта
        var sizes = { small: '14px', normal: '16px', large: '18px' };
        root.style.setProperty('--base-font-size', sizes[settings.fontsize] || sizes.normal);
        
        // Акцентный цвет
        root.style.setProperty('--accent', settings.accent);
    })();
</script>
</head>
<body>

    <!-- Nebula background orbs -->
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>
    <div class="nebula nebula-3"></div>

    <!-- Starfield canvas -->
    <canvas id="starCanvas"></canvas>

    <!-- Main content -->
    <div class="main-container">
        <!-- CSS Astronaut -->
        <div class="astronaut-wrapper">
            <div class="astronaut">
                <div class="astro-backpack"></div>
                <div class="astro-helmet">
                    <div class="astro-visor">
                        <div class="astro-visor-shine"></div>
                    </div>
                </div>
                <div class="astro-body"></div>
                <div class="astro-arm-left"></div>
                <div class="astro-arm-right"></div>
            </div>
        </div>

        <!-- 404 with glitch -->
        <div class="error-code">404</div>

        <!-- Subtitle -->
        <p class="subtitle" data-i18n="404-subtitle">Кажется, вы улетели <span class="highlight">слишком далеко</span> 🚀</p>

        <!-- Description -->
        <p class="description" data-i18n="404-desc">
            Страница, которую вы ищете, не существует или была перемещена в другую галактику.
            Возможно, стоит вернуться на орбиту и начать сначала.
        </p>

        <!-- Buttons -->
        <div class="buttons-row">
            <a href="https://daardos.github.io/DevFolio/index.html" class="btn btn-primary" data-i18n="404-btn">
                🏠 На главную
                <span class="icon-arrow">→</span>
            </a>
        </div>
    </div>

    <script>
        (function() {
            // ============ STARFIELD CANVAS ============
            const canvas = document.getElementById('starCanvas');
            const ctx = canvas.getContext('2d');
            let stars = [];
            let width, height;
            const STAR_COUNT = 280;
            const SHOOTING_STAR_INTERVAL = 4000; // ms between shooting stars

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', () => {
                resize();
                initStars();
            });

            function initStars() {
                stars = [];
                for (let i = 0; i < STAR_COUNT; i++) {
                    stars.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        r: Math.random() * 2.2 + 0.6,
                        twinkleSpeed: Math.random() * 0.02 + 0.005,
                        twinkleOffset: Math.random() * Math.PI * 2,
                        baseAlpha: Math.random() * 0.7 + 0.3,
                        hue: Math.random() < 0.15 ?
                            (Math.random() < 0.5 ? 260 : 330) // purple or pink tinted stars
                            :
                            0, // white
                        saturation: Math.random() < 0.15 ? 40 : 0,
                    });
                }
            }
            initStars();

            let time = 0;

            function drawStars() {
                ctx.clearRect(0, 0, width, height);
                time++;

                for (const star of stars) {
                    const alpha = star.baseAlpha + Math.sin(time * star.twinkleSpeed + star.twinkleOffset) * 0.35;
                    const clampedAlpha = Math.max(0.15, Math.min(1, alpha));

                    if (star.hue > 0 && star.saturation > 0) {
                        ctx.fillStyle = `hsla(${star.hue}, ${star.saturation}%, 80%, ${clampedAlpha})`;
                    } else {
                        ctx.fillStyle = `rgba(220,220,255,${clampedAlpha})`;
                    }

                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
                    ctx.fill();

                    // Extra glow for brighter stars
                    if (star.r > 1.6 && clampedAlpha > 0.7) {
                        ctx.fillStyle =
                            `rgba(180,180,255,${clampedAlpha * 0.25})`;
                        ctx.beginPath();
                        ctx.arc(star.x, star.y, star.r * 3.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            function animate() {
                drawStars();
                requestAnimationFrame(animate);
            }
            animate();

            // ============ SHOOTING STARS (DOM-BASED) ============
            function createShootingStar() {
                const star = document.createElement('div');
                star.classList.add('shooting-star');
                // Random start position in upper portion of screen
                const startX = Math.random() * width * 0.9 + width * 0.05;
                const startY = Math.random() * height * 0.35;
                star.style.left = startX + 'px';
                star.style.top = startY + 'px';
                // Vary the size slightly
                const scale = Math.random() * 0.7 + 0.6;
                star.style.height = (90 * scale) + 'px';
                star.style.width = (2 * scale) + 'px';
                document.body.appendChild(star);

                // Remove after animation
                const duration = 1800;
                setTimeout(() => {
                    if (star.parentNode) star.parentNode.removeChild(star);
                }, duration + 100);
            }

            // Initial shooting star after short delay
            setTimeout(createShootingStar, 1500);

            // Periodic shooting stars
            setInterval(() => {
                createShootingStar();
            }, SHOOTING_STAR_INTERVAL + Math.random() * 3000);

            // Occasional double shooting stars
            setTimeout(() => {
                setInterval(() => {
                    createShootingStar();
                    setTimeout(() => createShootingStar(), 300 + Math.random() * 600);
                }, SHOOTING_STAR_INTERVAL * 2.5 + Math.random() * 4000);
            }, 8000);

            // ============ PARALLAX ON MOUSE MOVE ============
            const nebulaEls = document.querySelectorAll('.nebula');
            const astroWrapper = document.querySelector('.astronaut-wrapper');
            const mainContainer = document.querySelector('.main-container');

            document.addEventListener('mousemove', (e) => {
                const mx = e.clientX / width - 0.5; // -0.5 to 0.5
                const my = e.clientY / height - 0.5;

                // Move nebulae slightly
                if (nebulaEls[0]) {
                    nebulaEls[0].style.transform = `translate(${mx * 50}px, ${my * 50}px) scale(1)`;
                }
                if (nebulaEls[1]) {
                    nebulaEls[1].style.transform = `translate(${mx * -40}px, ${my * -40}px) scale(1)`;
                }
                if (nebulaEls[2]) {
                    nebulaEls[2].style.transform =
                        `translate(calc(-50% + ${mx * 30}px), calc(-50% + ${my * 30}px)) scale(1)`;
                }
                // Slight astronaut reaction
                if (astroWrapper) {
                    astroWrapper.style.transform =
                        `translate(${mx * 15}px, ${my * 20 - 5}px) rotate(${mx * 4}deg)`;
                }
                // Very subtle container shift
                if (mainContainer) {
                    mainContainer.style.transform = `translate(${mx * -6}px, ${my * -6}px)`;
                }
            });

            // Reset on mouse leave
            document.addEventListener('mouseleave', () => {
                if (nebulaEls[0]) nebulaEls[0].style.transform = 'translate(0,0) scale(1)';
                if (nebulaEls[1]) nebulaEls[1].style.transform = 'translate(0,0) scale(1)';
                if (nebulaEls[2]) nebulaEls[2].style.transform = 'translate(-50%,-50%) scale(1)';
                if (astroWrapper) astroWrapper.style.transform = 'translate(0,0) rotate(0deg)';
                if (mainContainer) mainContainer.style.transform = 'translate(0,0)';
            });

            // ============ TOUCH PARALLAX FOR MOBILE ============
            document.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                const mx = touch.clientX / width - 0.5;
                const my = touch.clientY / height - 0.5;
                if (nebulaEls[0]) nebulaEls[0].style.transform = `translate(${mx*35}px, ${my*35}px)`;
                if (nebulaEls[1]) nebulaEls[1].style.transform = `translate(${mx*-30}px, ${my*-30}px)`;
                if (astroWrapper) astroWrapper.style.transform =
                    `translate(${mx*10}px, ${my*14}px) rotate(${mx*3}deg)`;
            }, { passive: true });

            console.log('%c🛸 404 — Lost in Space %c| %cВернитесь на Землю: /',
                'color:#7b5cff;font-size:18px;',
                '',
                'color:#ff4da6;');
            console.log('%c✨ Страница не найдена, но звёзды всё ещё на месте.',
                'color:#a0a0c0;font-style:italic;');
        })();

        // Автодобавление rel="noopener noreferrer" на все внешние ссылки
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('a[target="_blank"]').forEach(link => {
        // Проверяем, что ссылка действительно внешняя
        if (link.hostname !== window.location.hostname) {
            const rel = link.getAttribute('rel') || '';
            if (!rel.includes('noopener')) {
                link.setAttribute('rel', (rel + ' noopener noreferrer').trim());
            }
        }
    });
});

document.querySelectorAll('a[target="_blank"]:not([rel*="noopener"])').forEach(link => {
    link.setAttribute('rel', 'noopener noreferrer');
});
